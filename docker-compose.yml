version: "3.9"

services:

  # PostgreSQL
  db:
    image: postgres:16
    container_name: truelift_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      retries: 5
      timeout: 5s

  # Redis
  redis:
    image: redis:7
    container_name: truelift_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  # Django (ASGI Daphne)
  web:
    build: .
    container_name: truelift_web
    restart: unless-stopped
    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      daphne -b 0.0.0.0 -p 8000 Trueliftmovers.asgi:application
      "
    env_file:
      - .env
    volumes:
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Celery Worker
  celery:
    build: .
    container_name: truelift_celery
    restart: unless-stopped
    command: celery -A Trueliftmovers worker -l info --concurrency=4
    env_file:
      - .env
    depends_on:
      - redis
      - db

  # Celery Beat
  celery-beat:
    build: .
    container_name: truelift_celery_beat
    restart: unless-stopped
    command: celery -A Trueliftmovers beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env
    depends_on:
      - redis
      - db

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume: